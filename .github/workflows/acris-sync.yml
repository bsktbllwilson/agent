name: ACRIS Sync

on:
  schedule:
    # 09:00 UTC daily = 05:00 ET (04:00 during EDT)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Days to backfill'
        required: false
        default: '2'
      dry_run:
        description: 'Dry run (no Airtable writes)'
        type: boolean
        required: false
        default: false
      limit:
        description: 'Optional --limit N (blank = no limit)'
        required: false
        default: ''

concurrency:
  group: acris-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: acris-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: acris-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest test_tagging -v

      - name: Run sync
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '2' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          LIMIT: ${{ github.event.inputs.limit || '' }}
        run: |
          ARGS=(--backfill-days "$BACKFILL_DAYS")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "$LIMIT" ]; then
            ARGS+=(--limit "$LIMIT")
          fi
          echo "Running: python sync.py ${ARGS[*]}"
          python sync.py "${ARGS[@]}"
